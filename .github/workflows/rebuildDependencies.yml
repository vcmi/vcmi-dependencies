name: VCMI - dependencies

on:
  pull_request:
    paths-ignore:
      - README.md
      - .github/workflows/releaseFromRun.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac-intel
            os: macos-26
            before_install: macos.sh

          - platform: mac-arm
            os: macos-26
            before_install: macos.sh

          - platform: ios
            os: macos-26
            before_install: macos.sh

          - platform: android-armeabi-v7a
            os: ubuntu-latest
            before_install: android-32.sh

          - platform: android-arm64-v8a
            os: ubuntu-latest

          - platform: android-x64
            os: ubuntu-latest

          - platform: windows-x64
            os: windows-2025-vs2026

          - platform: windows-x86
            os: windows-2025-vs2026

          - platform: windows-arm64
            os: windows-11-vs2026-arm

          - platform: linux-x64
            os: ubuntu-24.04

          - platform: linux-arm64
            os: ubuntu-24.04-arm

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
    - name: Checkout current
      uses: actions/checkout@v6

    - name: Define common variables
      run: |
        echo BUILD_PLATFORM="${{ matrix.platform }}" >> "$GITHUB_ENV"
        echo DEPS_FILE="dependencies-${{ matrix.platform }}.txz" >> "$GITHUB_ENV"
        echo DEPS_LIST_FILE="dependencies-${{ matrix.platform }}.txt" >> "$GITHUB_ENV"

    - name: Prepare CI
      if: ${{ matrix.before_install }}
      run: ci/${{ matrix.before_install }}

    - name: Obtain path to the Windows-aware Perl
      if: ${{ startsWith(matrix.platform, 'windows') }}
      run: |
        windowsPerl=$(which -a perl | fgrep Strawberry)
        echo "WINDOWS_PERL_DIR=$(dirname "$windowsPerl")" >> "$GITHUB_ENV"

    - name: Install MSVC v142 toolset (Windows non-ARM)
      if: ${{ startsWith(matrix.platform, 'windows') && matrix.platform != 'windows-arm64' }}
      shell: pwsh
      run: |
        $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
        $installPath = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath

        $installer = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\setup.exe"
        & $installer modify --installPath "$installPath" --add Microsoft.VisualStudio.Component.VC.v142.x86.x64 --quiet --norestart

    - uses: actions/setup-java@v5
      if: ${{ startsWith(matrix.platform, 'android') }}
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Conan Client
      run: |
        pipx install conan
        conan profile detect
        echo 'tools.files.download:retry=50' >> ~/.conan2/global.conf

    - name: Prepare platform tools
      run: |
        BUILD_ACTION=prepare ./build.sh >> "$GITHUB_ENV"

    - name: Configure VS version for Conan
      if: ${{ startsWith(matrix.platform, 'windows') }}
      shell: pwsh
      run: |
        $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
        $vsInstallationVersion = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationVersion
        $vsMajor = ($vsInstallationVersion -split '\.')[0]

        $platformToolsPath = Join-Path -Path $env:RUNNER_TEMP -ChildPath platformTools
        # appends to [conf]
        Add-Content -Path $platformToolsPath -Value "tools.microsoft.msbuild:vs_version=$vsMajor"

    - name: Configure MSYS2
      if: ${{ startsWith(matrix.platform, 'windows') && matrix.platform != 'windows-arm64' }}
      shell: pwsh
      run: |
        $msysBash = "C:\msys64\usr\bin\bash.exe"
        $platformToolsPath = Join-Path -Path $env:RUNNER_TEMP -ChildPath platformTools

        # appends to [conf]
        Add-Content -Path $platformToolsPath -Value @"
        tools.microsoft.bash:path=$msysBash
        tools.microsoft.bash:subsystem=msys2
        "@

        Invoke-Expression "& $msysBash -l -c 'pacman -S base-devel gcc --noconfirm'"

    - name: Install system libs recipes
      run: |
        BUILD_ACTION=install_system_libs ./build.sh

    - name: Build recipes with our patches
      run: |
        BUILD_ACTION=build_recipes_with_patches ./build.sh

    - name: Build ONNX with our patches
      run: |
        BUILD_ACTION=build_onnx_recipes_with_patches ./build.sh

    - name: Build recipes from PR changes
      run: |
        BUILD_ACTION=build_recipes_from_cci_pull_requests ./build.sh

    - name: Build the rest of the dependencies
      run: |
        BUILD_ACTION=build_normal_recipes ./build.sh

    - name: Remove builds and source code
      run: conan cache clean

    - name: Remove build requirements' binaries
      run: |
        BUILD_ACTION=remove_build_requirements_binaries ./build.sh

    - name: Create list of built packages
      run: |
        packageList="$(conan list --format=compact | tail -n +2)"
        echo "$packageList" > "$DEPS_LIST_FILE"
        echo "CONAN_PACKAGES<<EOF
        $packageList
        EOF" >> "$GITHUB_ENV"

    - name: Create dependencies archive
      run: conan cache save --file "$DEPS_FILE" "*:*"

    - name: Upload binaries list
      uses: actions/upload-artifact@v7
      with:
        name: list of dependencies-${{ matrix.platform }}
        path: ${{ env.DEPS_LIST_FILE }}
    - name: Upload binaries
      uses: actions/upload-artifact@v7
      with:
        name: dependencies-${{ matrix.platform }}
        path: ${{ env.DEPS_FILE }}
        archive: false
